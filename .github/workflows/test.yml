name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Vitest (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Extract modules from single-file HTML
        run: npm run extract

      - name: Run tests
        run: npx vitest run --reporter=verbose

  audit:
    name: Static audit (file integrity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify HTML structure
        run: |
          # Garante que o arquivo termina com </html> (estrutura íntegra)
          if ! tail -n 5 solstice_baseline.html | grep -q '</html>'; then
            echo "::error::solstice_baseline.html não termina com </html>"
            exit 1
          fi
          # Tamanho razoável (entre 500KB e 5MB)
          SIZE=$(wc -c < solstice_baseline.html)
          if [ "$SIZE" -lt 500000 ] || [ "$SIZE" -gt 5000000 ]; then
            echo "::warning::Tamanho do arquivo fora do esperado: $SIZE bytes"
          fi
          # Boot sentinel presente
          if ! grep -q '\[Solstice\] boot OK' solstice_baseline.html; then
            echo "::error::Boot sentinel '[Solstice] boot OK' ausente — boot pode estar quebrado"
            exit 1
          fi
          echo "✓ HTML estrutura OK ($SIZE bytes)"

      - name: Check SRI hashes on CDN scripts
        run: |
          # Garante que os 3 scripts CDN têm integrity= e crossorigin=
          for lib in "chart.js" "papaparse" "xlsx"; do
            if ! grep -E "cdn\.jsdelivr\.net.*${lib}" solstice_baseline.html | grep -q 'integrity="sha384-'; then
              echo "::error::SRI ausente para $lib"
              exit 1
            fi
          done
          echo "✓ SRI presente em todas as libs CDN"

      - name: Check CSP meta tag
        run: |
          if ! grep -q 'Content-Security-Policy' solstice_baseline.html; then
            echo "::error::CSP meta tag ausente"
            exit 1
          fi
          echo "✓ CSP meta tag presente"

      - name: Check XSS regression
        run: |
          # Garante que o pattern do XSS original NÃO voltou
          if grep -E "left\.innerHTML\s*=\s*'👤'" solstice_baseline.html; then
            echo "::error::Regressão XSS detectada! left.innerHTML com c.author voltou."
            exit 1
          fi
          echo "✓ AP-01 ainda fechado"

      - name: Setup Node for parse-check
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: B7-01 — Parse-check anti SyntaxError silencioso (v6-autonomous)
        # Lição do hotfix: SolsticeViews duplicado quebrou IIFE inteira sem
        # nenhum erro visível em grep. Solução: rodar `new Function(script)`
        # contra cada <script> inline pra detectar SyntaxError no parse.
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('solstice_baseline.html', 'utf-8');
            const re = /<script(?:\s[^>]*(?<!src=\"[^\"]*\"))?\s*>([\s\S]*?)<\/script>/g;
            let m, n = 0, failed = 0;
            while ((m = re.exec(html)) !== null){
              n++;
              const src = m[1];
              if (src.length < 50) continue;
              try {
                new Function(src);
              } catch(e){
                failed++;
                console.error('::error::Script #' + n + ' (' + src.length + ' chars) NÃO parseia: ' + e.message);
              }
            }
            console.log('Scripts inline encontrados: ' + n + ', com erro de parse: ' + failed);
            if (failed > 0) process.exit(1);
          "

      - name: B7-02 — Anti-duplicação de IIFE Solstice*
        run: |
          node -e "
            const fs = require('fs');
            const html = fs.readFileSync('solstice_baseline.html', 'utf-8');
            // Remove comentários /* ... */ antes do match
            const stripped = html.replace(/\/\*[\s\S]*?\*\//g, '');
            const matches = [...stripped.matchAll(/const\s+(Solstice[A-Za-z0-9]+)\s*=\s*\(function/g)];
            const counts = {};
            matches.forEach(m => { counts[m[1]] = (counts[m[1]] || 0) + 1; });
            const dups = Object.entries(counts).filter(([_, n]) => n > 1);
            if (dups.length){
              dups.forEach(([name, n]) => console.error('::error::Solstice IIFE duplicada: ' + name + ' (' + n + 'x)'));
              process.exit(1);
            }
            console.log('✓ Todos os ' + matches.length + ' Solstice* IIFE são únicos');
          "

      - name: Audit innerHTML usage (B5-01 / v6-autonomous)
        run: |
          # Conta innerHTML totais e garante que todos os "dinâmicos" passam por escapeHtml.
          TOTAL=$(grep -cE "\.innerHTML\s*=" solstice_baseline.html || true)
          # Inseguros = innerHTML = variável que NÃO tem escapeHtml nas linhas próximas
          # Tolerância: se em 5 linhas antes do .innerHTML há escapeHtml/DOMPurify/string literal, ok
          UNSAFE=$(awk '/\.innerHTML\s*=\s*[a-zA-Z_]/ {
            ctx = ""
            for (i = NR-6; i < NR; i++) ctx = ctx " " saved[i]
            if (ctx !~ /escapeHtml|DOMPurify/) print NR": "$0
          } { saved[NR] = $0 }' solstice_baseline.html | wc -l)
          echo "innerHTML totais: $TOTAL"
          echo "Potencialmente inseguros (sem escapeHtml próximo): $UNSAFE"
          if [ "$UNSAFE" -gt 2 ]; then
            echo "::warning::Mais de 2 innerHTML dinâmicos sem escape próximo — audit manual"
          fi
          echo "✓ B5-01 audit innerHTML OK"

      - name: ADR-186 — Invariante de SolsticeLog (Auditoria 2026.3)
        # Garante que console.warn direto NÃO regride em módulos fallback.
        # Whitelist: locais onde console.warn direto é proposital
        # (SolsticeStorage fallback, SolsticeErrors.show, Parse warnings,
        # Stats selftest, Components.register, Calc circular, definição
        # do SolsticeLog em si, ErrorBoundary init pré-SolsticeLog,
        # rafThrottle pré-SolsticeLog, v5.6 patches históricos).
        run: |
          # Conta console.warn fora da whitelist
          FORBIDDEN=$(grep -nE "console\.warn\(" solstice_baseline.html | \
            grep -vE "\[SolsticeStorage\]|\[Solstice\] Parse warnings|\[Solstice\]', code|\[SolsticeStats selftest\]|\[SolsticeComponents\.register\]|\[Calc\] (falha em medida|dependência circular)|function warn\(\.\.\.args\)|\[SolsticeTheme\] Tema salvo|\[ErrorBoundary\] init falhou|\[rafThrottle\]|\[v5\.6 |\[Solstice v5\.6 patched\]|\[FormulaRow\]" || true)
          COUNT=$(echo -n "$FORBIDDEN" | grep -c . || true)
          echo "console.warn fora da whitelist ADR-186: $COUNT"
          if [ "$COUNT" -gt 0 ]; then
            echo "::error::ADR-186 (Auditoria 2026.3) violado — use SolsticeLog.warn/debug em fallbacks."
            echo "Sites detectados:"
            echo "$FORBIDDEN"
            exit 1
          fi
          echo "✓ ADR-186 OK — todos console.warn restantes estão na whitelist"

      - name: ADR-185 — Hierarquia de persistência documentada (Auditoria 2026.3)
        run: |
          # Garante que o cabeçalho ADR-185 não foi removido do topo do arquivo.
          if ! head -100 solstice_baseline.html | grep -q "ADR-185"; then
            echo "::error::ADR-185 (hierarquia de persistência) removido do cabeçalho do arquivo"
            exit 1
          fi
          if ! head -100 solstice_baseline.html | grep -q "ADR-186"; then
            echo "::error::ADR-186 (canal de fallback) removido do cabeçalho do arquivo"
            exit 1
          fi
          echo "✓ ADR-185/186 declarados no cabeçalho"

      - name: Voz pessoal removida do código (Sprint 9)
        run: |
          # Garante que voz interna não regride: 0 ocorrências de citações pessoais.
          LUCAS=$(grep -c 'Lucas:' solstice_baseline.html || true)
          DIR=$(grep -c 'Diretor:' solstice_baseline.html || true)
          PAREN=$(grep -c '(Diretor)' solstice_baseline.html || true)
          PROFANE=$(grep -cE 'foda-se|bosta' solstice_baseline.html || true)
          TOTAL=$((LUCAS + DIR + PAREN + PROFANE))
          echo "Citações Lucas: / Diretor: / (Diretor) / palavrões = $TOTAL"
          if [ "$TOTAL" -gt 0 ]; then
            echo "::error::Voz pessoal regrediu no código de produto. Sprint 9 (Auditoria 2026.4) violado."
            exit 1
          fi
          echo "✓ Sprint 9 OK — voz interna zerada"
