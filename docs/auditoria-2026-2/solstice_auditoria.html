<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoria — Product Audit Board</title>
<style>
  :root{
    --bg:#0e1014; --panel:#161922; --panel-2:#1d212c; --line:#2a2f3d;
    --text:#e7ebf2; --muted:#8b94a7; --accent:#5b8cff;
    --bloqueador:#ff5c5c; --alto:#ff9f43; --medio:#ffd24a; --baixo:#8c9bb5;
    --good:#3ddc97; --great:#2dd4bf;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font:15px/1.55 -apple-system,Segoe UI,Roboto,sans-serif;padding:32px 20px}
  .wrap{max-width:1000px;margin:0 auto}
  h1{font-size:24px;font-weight:700;letter-spacing:-.02em}
  h2{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:38px 0 14px}
  .sub{color:var(--muted);font-size:13px;margin-top:4px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:20px}

  .head{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .gauge{--p:0;width:128px;height:128px;border-radius:50%;flex:none;
    background:conic-gradient(var(--gauge-c) calc(var(--p)*1%),var(--panel-2) 0);
    display:grid;place-items:center;position:relative}
  .gauge::before{content:"";position:absolute;inset:11px;background:var(--panel);border-radius:50%}
  .gauge b{position:relative;font-size:34px;font-weight:700}
  .gauge small{position:relative;display:block;text-align:center;color:var(--muted);font-size:11px;margin-top:-4px}
  .head-info{flex:1;min-width:240px}
  .badge{display:inline-block;padding:5px 12px;border-radius:999px;font-size:13px;font-weight:600;margin-top:10px}
  .counts{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
  .chip{padding:4px 10px;border-radius:8px;background:var(--panel-2);font-size:12px;font-weight:600;border:1px solid var(--line)}
  .chip i{font-style:normal}
  .synthesis{margin-top:14px;font-size:14px;line-height:1.6}
  .synthesis b{color:var(--accent)}

  /* Painel de personas */
  .personas{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
  .pcard .ph{display:flex;gap:9px;align-items:baseline}
  .pcard .em{font-size:20px} .pcard .pn{font-weight:700;font-size:14px}
  .pcard .pr{color:var(--muted);font-size:11px;margin-top:1px}
  .pcard .pv{margin-top:8px;font-size:13px;font-style:italic;color:var(--text);border-left:2px solid var(--accent);padding-left:10px}

  .blockers{margin-top:16px;border:1px solid var(--bloqueador);background:rgba(255,92,92,.08);border-radius:14px;padding:16px 20px}
  .blockers h3{color:var(--bloqueador);font-size:14px;margin-bottom:8px}
  .blockers li{margin-left:18px;font-size:14px}

  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .filters button{background:var(--panel-2);color:var(--muted);border:1px solid var(--line);
    padding:6px 12px;border-radius:999px;font-size:12px;font-weight:600;cursor:pointer}
  .filters button.on{background:var(--accent);color:#fff;border-color:var(--accent)}

  .finding{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden;background:var(--panel)}
  .f-head{display:flex;gap:10px;align-items:center;padding:13px 16px;cursor:pointer}
  .f-head:hover{background:var(--panel-2)}
  .sev-dot{width:10px;height:10px;border-radius:50%;flex:none}
  .f-id{font:600 12px ui-monospace,monospace;color:var(--muted)}
  .f-title{font-weight:600;flex:1}
  .f-persona{font-size:11px;color:var(--muted);background:var(--panel-2);padding:3px 8px;border-radius:6px;border:1px solid var(--line)}
  .f-body{display:none;padding:0 16px 16px;border-top:1px solid var(--line)}
  .finding.open .f-body{display:block}
  .f-body dt{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:12px}
  .f-body dd{font-size:14px;margin-top:3px}
  pre{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:12px;margin-top:6px;
    overflow:auto;font:13px/1.5 ui-monospace,monospace;white-space:pre-wrap}
  .diff-add{color:var(--good)} .diff-del{color:var(--bloqueador)}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:10px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
  .prio{font-weight:700} .prio.Alta{color:var(--bloqueador)} .prio.Média{color:var(--alto)} .prio.Baixa{color:var(--baixo)}
  .empty{color:var(--muted);font-size:13px;padding:14px 0}
  footer{margin-top:40px;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
<div class="wrap">

<!-- ====================================================================

    alto:{label:"Alto",c:"var(--alto)"},
    medio:{label:"Médio",c:"var(--medio)"},
    baixo:{label:"Baixo",c:"var(--baixo)"}
  };
  const TONE = {bad:"var(--bloqueador)",warn:"var(--alto)",good:"var(--good)",great:"var(--great)"};
  const esc = s => String(s==null?"":s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

  document.getElementById("title").textContent = "Auditoria — "+D.product;
  document.getElementById("meta").textContent =
    `${D.file} · ${Number(D.lines).toLocaleString("pt-BR")} linhas · ${D.date}`;

  const tone = TONE[D.verdict.tone]||"var(--accent)";
  const g = document.getElementById("gauge");
  g.style.setProperty("--p",D.score); g.style.setProperty("--gauge-c",tone);
  document.getElementById("scoreNum").textContent = D.score;
  const vb = document.getElementById("verdict");
  vb.textContent = D.verdict.label; vb.style.background = tone; vb.style.color = "#0e1014";

  document.getElementById("counts").innerHTML = ["bloqueador","alto","medio","baixo"]
    .map(k=>`<span class="chip"><i style="color:${SEV[k].c}">●</i> ${D.counts[k]||0} ${SEV[k].label}</span>`)
    .join("");
  document.getElementById("synthesis").innerHTML = "<b>Síntese (Helena):</b> "+esc(D.synthesis);

  // Painel de personas
  document.getElementById("personas").innerHTML = (D.personas||[]).map(p=>
    `<div class="pcard"><div class="ph"><span class="em">${esc(p.emoji)}</span>
      <span><div class="pn">${esc(p.name)}</div><div class="pr">${esc(p.role)}</div></span></div>
      <div class="pv">${esc(p.verdict)}</div></div>`).join("");

  // Bloqueadores
  const blockers = D.findings.filter(f=>f.severity==="bloqueador");
  if(blockers.length){
    document.getElementById("blockerBox").innerHTML =
      `<div class="blockers"><h3>🔴 ${blockers.length} bloqueador(es) — corrigir antes de qualquer release</h3>
       <ul>${blockers.map(f=>`<li><b>[${esc(f.id)}]</b> ${esc(f.title)} — <span style="color:var(--muted)">${esc(f.location)}</span></li>`).join("")}</ul></div>`;
  }

  // Filtros
  let perF="todas", sevF="todas";
  const personas = ["todas",...new Set(D.findings.map(f=>f.persona))];
  const sevs = ["todas","bloqueador","alto","medio","baixo"];
  function buildFilters(id,arr,getCur,setCur,labelFn){
    const host=document.getElementById(id); host.innerHTML="";
    arr.forEach(v=>{
      const b=document.createElement("button");
      b.textContent=labelFn(v); b.className=getCur()===v?"on":"";
      b.onclick=()=>{setCur(v);render();
        [...host.children].forEach((c,i)=>c.className=arr[i]===getCur()?"on":"");};
      host.appendChild(b);
    });
  }
  buildFilters("personaFilters",personas,()=>perF,v=>perF=v,v=>v==="todas"?"Todas as personas":v);
  buildFilters("sevFilters",sevs,()=>sevF,v=>sevF=v,v=>v==="todas"?"Todas as severidades":SEV[v].label);

  const order={bloqueador:0,alto:1,medio:2,baixo:3};
  function render(){
    const list=D.findings
      .filter(f=>(perF==="todas"||f.persona===perF)&&(sevF==="todas"||f.severity===sevF))
      .sort((a,b)=>order[a.severity]-order[b.severity]);
    const host=document.getElementById("findings");
    if(!list.length){host.innerHTML='<div class="empty">Nenhum achado com esses filtros.</div>';return;}
    host.innerHTML=list.map(f=>{
      const s=SEV[f.severity]||SEV.baixo;
      const patch=esc(f.patch).split("\n").map(l=>{
        if(l.startsWith("+"))return`<span class="diff-add">${l}</span>`;
        if(l.startsWith("-"))return`<span class="diff-del">${l}</span>`;
        return l;}).join("\n");
      return `<div class="finding">
        <div class="f-head" onclick="this.parentNode.classList.toggle('open')">
          <span class="sev-dot" style="background:${s.c}"></span>
          <span class="f-id">${esc(f.id)}</span>
          <span class="f-title">${esc(f.title)}</span>
          <span class="f-persona">${esc(f.persona)}</span>
        </div>
        <div class="f-body">
          <dt>Local</dt><dd>${esc(f.location)}</dd>
          <dt>Evidência</dt><dd><pre>${esc(f.evidence)}</pre></dd>
          <dt>Impacto</dt><dd>${esc(f.impact)}</dd>
          <dt>Patch sugerido</dt><dd><pre>${patch}</pre></dd>
        </div></div>`;
    }).join("");
  }
  render();

  const bm=D.benchmark||[];
  document.getElementById("benchmark").innerHTML = bm.length
    ? `<table><thead><tr><th>Capacidade</th><th>Como líderes fazem</th><th>Gap</th><th>Melhoria sugerida</th><th>Prioridade</th></tr></thead>
       <tbody>${bm.map(r=>`<tr><td><b>${esc(r.capability)}</b></td><td>${esc(r.leaders)}</td>
       <td>${esc(r.gap)}</td><td>${esc(r.suggestion)}</td>
       <td class="prio ${esc(r.priority)}">${esc(r.priority)}</td></tr>`).join("")}</tbody></table>`
    : '<div class="empty" style="padding:16px">Sem itens de benchmark.</div>';
})();
</script>
</body>
</html>
